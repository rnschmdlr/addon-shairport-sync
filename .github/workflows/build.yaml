name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.3.0)'
        required: true
        type: string
      notes:
        description: 'Changelog entry'
        required: true
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ inputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in config.yaml
        env:
          VERSION: ${{ inputs.version }}
        run: |
          sed -i "s/^version: .*/version: ${VERSION}/" shairport_sync/config.yaml

      - name: Prepend changelog entry
        env:
          VERSION: ${{ inputs.version }}
          NOTES: ${{ inputs.notes }}
        run: |
          python3 - <<'EOF'
          import os
          version = os.environ['VERSION']
          notes = os.environ['NOTES']
          with open('shairport_sync/CHANGELOG.md', 'r') as f:
              content = f.read()
          entry = f"## {version}\n\n{notes}\n\n"
          content = content.replace('# Changelog\n\n', f'# Changelog\n\n{entry}', 1)
          with open('shairport_sync/CHANGELOG.md', 'w') as f:
              f.write(content)
          EOF

      - name: Commit and push
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shairport_sync/config.yaml shairport_sync/CHANGELOG.md
          git commit -m "chore: release v${VERSION}"
          git push origin master

  build:
    needs: prepare
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            platform: linux/arm64
          - arch: amd64
            platform: linux/amd64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./shairport_sync
          file: ./shairport_sync/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_FROM=ghcr.io/hassio-addons/base:20.0.1
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ needs.prepare.outputs.version }}
          tags: |
            ghcr.io/rnschmdlr/addon-shairport-sync/${{ matrix.arch }}:${{ needs.prepare.outputs.version }}
            ghcr.io/rnschmdlr/addon-shairport-sync/${{ matrix.arch }}:latest
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
