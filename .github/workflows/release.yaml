name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.3.0)'
        required: true
        type: string
      notes:
        description: 'Changelog entry'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in config.yaml
        env:
          VERSION: ${{ inputs.version }}
        run: sed -i "s/^version: .*/version: ${VERSION}/" shairport_sync/config.yaml

      - name: Prepend changelog entry
        env:
          VERSION: ${{ inputs.version }}
          NOTES: ${{ inputs.notes }}
        run: |
          python3 - <<'EOF'
          import os
          version = os.environ['VERSION']
          notes = os.environ['NOTES']
          with open('shairport_sync/CHANGELOG.md', 'r') as f:
              content = f.read()
          entry = f"## {version}\n\n{notes}\n\n"
          content = content.replace('# Changelog\n\n', f'# Changelog\n\n{entry}', 1)
          with open('shairport_sync/CHANGELOG.md', 'w') as f:
              f.write(content)
          EOF

      - name: Commit and push
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shairport_sync/config.yaml shairport_sync/CHANGELOG.md
          git commit -m "chore: release v${VERSION}"
          git push origin master
