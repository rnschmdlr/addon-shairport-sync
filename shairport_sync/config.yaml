---
name: Shairport Sync
version: 1.1.0
slug: shairport_sync
description: AirPlay and AirPlay 2 audio receiver for Home Assistant
url: https://github.com/WangChuDi/addon-shairport-sync
startup: application
init: false
arch:
  - aarch64
  - amd64
boot: auto
hassio_api: true
host_network: true
audio: true
privileged:
  - SYS_NICE
map:
  - config:rw
options:
  log_level: info
  avahi_interfaces: ""
  avahi_hostname: ""
  avahi_domainname: local
  airplay_name: Home Assistant
  enable_ipv6: false
  interpolation: soxr
  alsa_output_device: ""
  audio_backend_buffer_desired_length_in_seconds: 0.5
  mqtt_enabled: false
  mqtt_hostname: core-mosquitto
  mqtt_port: 1883
  mqtt_topic: shairport-sync
  mqtt_username: ""
  mqtt_password: ""
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  avahi_interfaces: str?
  avahi_hostname: str?
  avahi_domainname: str
  airplay_name: str
  enable_ipv6: bool
  interpolation: list(auto|basic|soxr)
  alsa_output_device: str?
  audio_backend_buffer_desired_length_in_seconds: float
  mqtt_enabled: bool
  mqtt_hostname: str
  mqtt_port: int
  mqtt_topic: str
  mqtt_username: str?
  mqtt_password: password?
