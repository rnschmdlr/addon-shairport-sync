---
name: Shairport Sync
version: 1.2.1
slug: shairport_sync
image: ghcr.io/rnschmdlr/addon-shairport-sync/{arch}
description: AirPlay audio receiver for Home Assistant
url: https://github.com/rnschmdlr/addon-shairport-sync
startup: application
init: false
arch:
  - aarch64
  - amd64
boot: auto
hassio_api: true
host_network: true
audio: true
privileged:
  - SYS_NICE
  - NET_ADMIN
map:
  - config:rw
options:
  log_level: info
  log_verbosity: 1
  avahi_interfaces: ""
  avahi_hostname: ""
  avahi_domainname: local
  airplay_name: Home Assistant
  enable_ipv6: false
  interpolation: soxr
  volume_control_profile: dasl_tapered
  audio_backend_buffer_desired_length_in_seconds: 0.5
  audio_decoded_buffer_desired_length_in_seconds: 3.0
  resync_threshold_in_seconds: 0.2
  allow_session_interruption: yes
  mqtt_enabled: false
  mqtt_hostname: core-mosquitto
  mqtt_port: 1883
  mqtt_topic: shairport-sync
  mqtt_username: ""
  mqtt_password: ""
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  log_verbosity: int
  avahi_interfaces: str?
  avahi_hostname: str?
  avahi_domainname: str
  airplay_name: str
  enable_ipv6: bool
  interpolation: list(auto|basic|vernier|soxr)
  volume_control_profile: list(dasl_tapered|flat|standard)
  audio_backend_buffer_desired_length_in_seconds: float
  audio_decoded_buffer_desired_length_in_seconds: float
  resync_threshold_in_seconds: float
  allow_session_interruption: list(yes|no)
  mqtt_enabled: bool
  mqtt_hostname: str
  mqtt_port: int
  mqtt_topic: str
  mqtt_username: str?
  mqtt_password: password?
